<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <link href='https://fonts.googleapis.com/css?family=Caveat' rel='stylesheet'>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
        <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css'>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"> 
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css" integrity="sha512-hoalWLoI8r4UszCkZ5kL8vayOGVae1oxXe/2A4AO6J9+580uKHDO3JdHb7NzwwzK5xr/Fs0W40kiNHxM9vyTtQ==" crossorigin=""/>
        <link rel="stylesheet" href="stylesheet.css">
    </head>
    <body>
        <div id="mainContainer">
            <div id="footer">
                <p id="kite">Kite</p>
                <ul>
                    <li>
                        <div class="addSpot">
                            <button class="btn btn-primary" id="addSpotButton" onclick = "addSpotDropdownButton()">Add Spot</button>
                            <div id="dropdownAddSpot" class="addSpotDropdown">
                                <form>
                                    <label for="name">Name:</label>
                                    <br>
                                    <input type="text" id="name">
                                    <br><br>
                                    <label for="country">Country: </label>
                                    <br>
                                    <input type="text" id="country">
                                    <br><br>
                                    <label for="wind">Wind Probability: </label>
                                    <br>
                                    <input type="text" id="wind">
                                    <br><br>
                                    <label for="latitude">Latitude: </label>
                                    <br>
                                    <input type="text" id="latitude">
                                    <br><br>
                                    <label for="longitude">Longitude: </label>
                                    <br>
                                    <input type="text" id="longitude">
                                    <br><br>
                                    <label for="month">When to go: </label>
                                    <br>
                                    <input type="text" id="month">
                                    <br><br>
                                    <input type="button" id="submitButton" value="Submit" onclick = "submitSpot()">
                                </form>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="favourite">
                            <button id="favouriteButton" onclick = "favouriteDropdownButton()">
                                <i class="fa fa-heart"></i> Favourite Spots
                            </button>
                            <div id="dropdownFavourite" class="favouriteDropdown">
                                <div class="favouriteTitle">
                                    <h3>No favourite spot in your list</h3>
                                </div>
                                <div class="favouriteSpots"></div>
                                <br>
                                <div class="favouriteSpotsNewIndex"></div>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="profile">
                            <button id="profileButton" onclick = "profileDropdownButton()">
                                <i class="fa fa-user"></i>
                            </button>
                            <div id="dropdownProfile" class="profileDropdown">
                                <a id ="logInPage" href="loginIndex.html">
                                    <i class="fa fa-sign-out"> Logout</i></a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <div id="map"></div>
            <br>
            <h4>Locations
                <div id="locations"></div>
            </h4>
        </div>
        <input type="text" id="search" placeholder="   Search..." onkeyup="search()">
        <div>
            <br>
           <table class="table table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>
                            <div>Name</div>
                        </th>
                        <th>
                            <div>Country</div>
                        </th>
                        <th>
                            <div>Latitude</div>
                        </th>
                        <th>
                            <div>Longitude</div>
                        </th>
                        <th>
                            <div>Wind Prob</div>
                        </th>
                        <th>
                            <div>When to go</div>
                        </th>
                    </tr>
                </thead>
            </table>
        </div>
        <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js" integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ==" crossorigin=""></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
