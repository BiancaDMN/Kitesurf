<!DOCTYPE html>
<html>
    <head>
        <title>Dashboard</title>
        <link href='https://fonts.googleapis.com/css?family=Caveat' rel='stylesheet'>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
        <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css'>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous"> 
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css" integrity="sha512-hoalWLoI8r4UszCkZ5kL8vayOGVae1oxXe/2A4AO6J9+580uKHDO3JdHb7NzwwzK5xr/Fs0W40kiNHxM9vyTtQ==" crossorigin=""/>
        <link rel="stylesheet" href="stylesheetDashboard.css">
    </head>
    <body>
        <div id="mainContainer">
            <div id="footer">
                <p id="kite">Kite</p>
                <ul>
                    <li>
                        <div class="addSpot">
                            <button class="btn btn-primary" id="addSpotButton" onclick = "addSpotDropdownButton()">Add Spot</button>
                            <div id="dropdownAddSpot" class="addSpotDropdown">
                                <p>Add Spot</p>
                                <form id="spotForm">
                                    <label for="name" id="addNm">Name:</label>
                                    <br>
                                    <input type="text" id="addName">
                                    <br><br>
                                    <label for="country" id="addCntry">Country: </label>
                                    <br>
                                    <input type="text" id="addCountry">
                                    <br><br>
                                    <label for="wind" id="addWnd">Wind Probability: </label>
                                    <br>
                                    <input type="text" id="addWind">
                                    <br><br>
                                    <label for="latitude" id="addLttd">Latitude: </label>
                                    <br>
                                    <input type="text" id="addLatitude">
                                    <br><br>
                                    <label for="longitude" id="addLngtd">Longitude: </label>
                                    <br>
                                    <input type="text" id="addLongitude">
                                    <br><br>
                                    <label for="time" id="addtime">When to go: </label>
                                    <br>
                                    <select id="selectMonths">
                                        <option value="0">Select month</option>
                                        <option value="January">January</option>
                                        <option value="February">February</option>
                                        <option value="March">March</option>
                                        <option value="April">April</option>
                                        <option value="May">May</option>
                                        <option value="June">June</option>
                                        <option value="July">July</option>
                                        <option value="August">August</option>
                                        <option value="September">September</option>
                                        <option value="October">October</option>
                                        <option value="November">November</option>
                                        <option value="December">December</option>
                                    </select>
                                    <br><br>
                                    <div id="action">
                                        <button type="button" class="btn btn-outline-danger" id="cancelButton" onclick = "cancelSpot()">Cancel</button>
                                        <button type="button" class="btn btn-outline-primary" id="submitButton" onclick = "submitSpot()">Confirm</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="favourite">
                            <button class="btn btn-primary" id="favouriteButton" onclick = "favouriteDropdownButton()">
                                <i class="fa fa-heart"></i> Favourite Spots
                            </button>
                            <div id="dropdownFavourite" class="favouriteDropdown">
                                <div class="favouriteTitle">
                                    <h3>No favourite spot in your list</h3>
                                </div>
                                <div class="favouriteSpots"></div>
                                <br>
                                <div class="favouriteSpotsNewIndex"></div>
                            </div>
                        </div>
                    </li>
                    <li>
                        <div class="profile">
                            <button id="profileButton" onclick = "profileDropdownButton()">
                                <i class="fa fa-user"></i>
                            </button>
                            <div id="dropdownProfile" class="profileDropdown">
                                <a id ="logInPage" href="loginIndex.html">
                                    <i class="fa fa-sign-out"> Logout</i></a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <div id="mainContent">
                <div id="map"></div>
                <br>
                <div id="locations">
                    <h4>Locations</h4>
                    <input type="text" id="search" placeholder="   Search..." onkeyup="search()">
                    <br><br>
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered" cellspacing="0">
                            <thead class="table-dark">
                                <tr>
                                    <th>
                                        <div>Name</div>
                                    </th>
                                    <th>
                                        <div>Country</div>
                                    </th>
                                    <th>
                                        <div>Latitude</div>
                                    </th>
                                    <th>
                                        <div>Longitude</div>
                                    </th>
                                    <th>
                                        <div>Wind Prob</div>
                                    </th>
                                    <th>
                                        <div>When to go</div>
                                    </th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js" integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ==" crossorigin=""></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
        <script type="text/javascript" src="scriptDashboard.js"></script>
    </body>
</html>
